apiVersion: gh-infra/v1
kind: Repository
metadata:
  name: zenn-markdown-skill
  owner: shuntaka9576
spec:
  description: ✍️ Claude Code skill for tuning Markdown to Zenn syntax (`:::message`, `:::details`, embed cards, SpeakerDeck oEmbed, KaTeX, mermaid, etc.)
  visibility: public
  archived: false
  topics:
    - zenn
    - markdown
    - claude
    - claude-code
    - claude-skill
    - agent-skill
    - skills
  features:
    issues: true
    projects: false
    wiki: false
    discussions: false
  merge_strategy:
    allow_merge_commit: true
    allow_squash_merge: true
    allow_rebase_merge: true
    auto_delete_head_branches: true
    squash_merge_commit_title: COMMIT_OR_PR_TITLE
    squash_merge_commit_message: COMMIT_MESSAGES
    merge_commit_title: MERGE_MESSAGE
    merge_commit_message: PR_TITLE
  release_immutability: true
  rulesets:
    - name: main
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - ~DEFAULT_BRANCH
      rules:
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
  actions:
    enabled: true
    allowed_actions: all
    sha_pinning_required: false
    workflow_permissions: read
    can_approve_pull_requests: true
    fork_pr_approval: first_time_contributors
